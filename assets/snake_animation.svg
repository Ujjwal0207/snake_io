<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#0a0e17"/>
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <!-- Neon glow filter -->
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-title" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline effect -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0,255,136,0.03)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0a0e17"/>
  <rect width="800" height="200" fill="url(#grid)"/>
  <rect width="800" height="200" fill="url(#scanlines)"/>

  <!-- Border glow -->
  <rect x="2" y="2" width="796" height="196" rx="12" ry="12" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3"/>

  <!-- === MOVING SNAKE === -->
  <!-- Snake body segment 5 (tail) -->
  <rect x="0" y="90" width="16" height="16" rx="3" fill="#008c46" opacity="0.6" filter="url(#glow-green)">
    <animate attributeName="x" values="-80;720" dur="8s" repeatCount="indefinite"/>
  </rect>
  <!-- Snake body segment 4 -->
  <rect x="0" y="90" width="16" height="16" rx="3" fill="#009c50" opacity="0.7" filter="url(#glow-green)">
    <animate attributeName="x" values="-60;740" dur="8s" repeatCount="indefinite"/>
  </rect>
  <!-- Snake body segment 3 -->
  <rect x="0" y="90" width="16" height="16" rx="3" fill="#00b45a" opacity="0.8" filter="url(#glow-green)">
    <animate attributeName="x" values="-40;760" dur="8s" repeatCount="indefinite"/>
  </rect>
  <!-- Snake body segment 2 -->
  <rect x="0" y="90" width="16" height="16" rx="3" fill="#00cc6a" opacity="0.9">
    <animate attributeName="x" values="-20;780" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="90;88;92;88;90" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Snake body segment 1 -->
  <rect x="0" y="90" width="16" height="16" rx="3" fill="#00cc6a">
    <animate attributeName="x" values="0;800" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="90;92;88;92;90" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Snake HEAD -->
  <rect x="0" y="90" width="18" height="18" rx="4" fill="#00ff88" filter="url(#glow-green)">
    <animate attributeName="x" values="20;820" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="89;91;87;91;89" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Snake eye -->
  <circle cx="0" cy="95" r="2" fill="#0a0e17">
    <animate attributeName="cx" values="33;833" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;97;93;97;95" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- === APPLES (stationary, pulsing) === -->
  <circle cx="200" cy="98" r="7" fill="#ef4444" filter="url(#glow-red)">
    <animate attributeName="r" values="7;9;7" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;0;0;0;0;0;1" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="98" r="7" fill="#ef4444" filter="url(#glow-red)">
    <animate attributeName="r" values="7;9;7" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="1;0;0;0;0;0;0;1" dur="8s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <circle cx="640" cy="98" r="7" fill="#ef4444" filter="url(#glow-red)">
    <animate attributeName="r" values="7;9;7" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="1;0;0;0;0;0;0;1" dur="8s" repeatCount="indefinite" begin="5s"/>
  </circle>

  <!-- === TITLE TEXT === -->
  <text x="400" y="55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="bold" fill="#00ff88" filter="url(#glow-title)">
    🐍 Snake AI
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="400" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="4">
    DEEP Q-NETWORK REINFORCEMENT LEARNING
  </text>

  <!-- Subtitle -->
  <text x="400" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b">
    Watch an AI learn to play Snake from scratch using neural networks
  </text>

  <!-- Bottom decorative line -->
  <line x1="200" y1="175" x2="600" y2="175" stroke="#00ff88" stroke-width="1" opacity="0.2"/>

  <!-- Animated particles -->
  <circle r="1.5" fill="#00ff88" opacity="0.6">
    <animate attributeName="cx" values="100;700" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;170;30" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="1" fill="#a855f7" opacity="0.4">
    <animate attributeName="cx" values="700;100" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;50;150" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.2" fill="#3b82f6" opacity="0.5">
    <animate attributeName="cx" values="300;600;300" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="180;20;180" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
